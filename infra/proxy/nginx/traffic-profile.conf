# M5-F2 - Traffic profile enforcement (NGINX reference)
# Objetivo:
# 1) Forzar x-traffic-profile para trafico operacional.
# 2) Forzar validation en host/ruta QA.
# 3) Denegar valores no permitidos enviados por cliente.
#
# Nota:
# - Esta configuracion es una plantilla base para borde/proxy.
# - Ajustar server_name/certificados/upstreams segun ambiente real.

map $http_x_traffic_profile $incoming_profile_valid {
  default 0;
  operational 1;
  validation 1;
  "" 1;
}

map $host $forced_profile_by_host {
  default operational;
  qa-api.revisor.cl validation;
}

upstream pac_api_upstream {
  server api:4000;
}

server {
  listen 443 ssl;
  server_name api.revisor.cl;

  # Denegar header invalido desde cliente
  if ($incoming_profile_valid = 0) {
    return 400;
  }

  # Operacion real: forzar operacional y bloquear sobrescritura externa
  location / {
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;
    proxy_set_header x-traffic-profile $forced_profile_by_host;
    proxy_pass http://pac_api_upstream;
  }
}

server {
  listen 443 ssl;
  server_name qa-api.revisor.cl;

  # Denegar header invalido desde cliente
  if ($incoming_profile_valid = 0) {
    return 400;
  }

  # Host QA completo forzado a validation
  location / {
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;
    proxy_set_header x-traffic-profile validation;
    proxy_pass http://pac_api_upstream;
  }
}

server {
  listen 443 ssl;
  server_name api.revisor.cl;

  # Ruta QA aislada en host operacional, forzada a validation
  location /api/v1/internal/qa/ {
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;
    proxy_set_header x-traffic-profile validation;
    proxy_pass http://pac_api_upstream;
  }
}
