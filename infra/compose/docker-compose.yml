services:
  postgres:
    image: postgres:16-alpine
    container_name: pac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pac_user
      POSTGRES_PASSWORD: pac_password
      POSTGRES_DB: pac_nymaju_spr
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pac_user -d pac_nymaju_spr"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pac_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pac-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - pac_redis_data:/data

  adminer:
    image: adminer:latest
    container_name: pac-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pac_postgres_data:
  pac_redis_data:
