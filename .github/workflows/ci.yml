name: CI Quality Gates

'on':
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  api-quality:
    name: API Typecheck + Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pac_nymaju_spr
          POSTGRES_USER: pac_user
          POSTGRES_PASSWORD: pac_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pac_user -d pac_nymaju_spr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://pac_user:pac_password@localhost:5432/pac_nymaju_spr?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret
      JWT_REFRESH_SECRET: ci_refresh_secret
      API_PREFIX: /api/v1
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations
        run: pnpm db:migrate:deploy

      - name: Run quality gates
        run: pnpm preflight:ci
